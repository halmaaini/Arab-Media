<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>الموسوعة الذكية — العرض</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Aref+Ruqaa:wght@700&family=IBM+Plex+Sans+Arabic:wght@400;500;600;700&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'IBM Plex Sans Arabic', sans-serif; direction: rtl;
    background:
      radial-gradient(1200px 700px at 80% -10%, #163A3D 0%, transparent 60%),
      radial-gradient(900px 600px at 0% 110%, #13433A 0%, transparent 55%),
      #081D1B;
    color: #F2EDE1; min-height: 100vh; overflow-x: hidden; }
  body::before { content: ''; position: fixed; inset: 0; pointer-events: none; opacity: .5;
    background: repeating-linear-gradient(45deg, transparent 0 30px, rgba(201,154,59,.04) 30px 31px), repeating-linear-gradient(-45deg, transparent 0 30px, rgba(201,154,59,.04) 30px 31px); }
  .top { position: relative; text-align: center; padding: 40px 24px 8px; }
  .wm { font-family: 'Aref Ruqaa', serif; font-size: 34px; color: #E7C77E; line-height: 1; }
  .sub { color: #A9BEB7; font-size: 15px; margin-top: 10px; letter-spacing: .02em; }
  .tag { display: inline-flex; gap: 8px; align-items: center; margin-top: 18px; font-size: 13px; color: #E7C77E; background: rgba(201,154,59,.12); border: 1px solid rgba(201,154,59,.3); padding: 7px 16px; border-radius: 999px; }
  .open-link { display: inline-block; margin-top: 16px; color: #081D1B; background: #C99A3B; font-weight: 600; font-size: 14px; padding: 10px 20px; border-radius: 12px; text-decoration: none; transition: background .2s; }
  .open-link:hover { background: #E7C77E; }

  .stage { position: relative; width: 100%; overflow: hidden; padding: 20px 0 60px; display: flex; justify-content: center; align-items: flex-start; }
  .stage-inner { transform-origin: top center; width: max-content; }
  .devices { display: flex; align-items: flex-end; gap: 56px; }

  .label { text-align: center; color: #A9BEB7; font-size: 14px; font-weight: 600; margin-bottom: 16px; letter-spacing: .04em; }
  .label b { color: #E7C77E; }

  /* desktop browser */
  .browser { width: 1200px; border-radius: 16px; overflow: hidden; background: #0F2A27;
    box-shadow: 0 40px 100px rgba(0,0,0,.55), 0 0 0 1px rgba(231,199,126,.12); }
  .browser .bar { height: 46px; display: flex; align-items: center; gap: 14px; padding: 0 16px; background: #143531; border-bottom: 1px solid #21433E; }
  .dots { display: flex; gap: 8px; }
  .dots i { width: 12px; height: 12px; border-radius: 50%; display: block; }
  .url { flex: 1; height: 28px; border-radius: 8px; background: #0F2A27; display: flex; align-items: center; justify-content: center; gap: 8px; color: #A9BEB7; font-size: 13px; }
  .browser iframe { width: 1200px; height: 820px; border: 0; display: block; background: #FAF5EC; }

  /* phone */
  .phone { width: 430px; flex: none; border-radius: 52px; padding: 14px; background: linear-gradient(160deg, #1b1b1f, #0c0c0e);
    box-shadow: 0 40px 90px rgba(0,0,0,.6), inset 0 0 0 2px rgba(231,199,126,.15); position: relative; }
  .phone::after { content: ''; position: absolute; top: 24px; left: 50%; transform: translateX(-50%); width: 120px; height: 30px; background: #0c0c0e; border-radius: 0 0 18px 18px; z-index: 3; }
  .phone .screen { border-radius: 40px; overflow: hidden; background: #FAF5EC; position: relative; }
  .phone iframe { width: 402px; height: 850px; border: 0; display: block; }

  @media (max-width: 700px){ .wm { font-size: 28px; } }
</style>
</head>
<body>
  <div class="top">
    <div class="wm">الموسوعة الذكية</div>
    <div class="sub">منصّة عربية للاستماع والقراءة — خلاصات الكتب · نموذج تفاعلي</div>
    <div><span class="tag">● نموذج حيّ وتفاعلي — جرّب التنقّل والمشغّل والبحث</span></div>
    <div><a class="open-link" href="app.html" target="_blank">افتح التطبيق في نافذة كاملة ↗</a></div>
  </div>

  <div class="stage">
    <div class="stage-inner" id="stageInner">
      <div class="devices">
        <div>
          <div class="label">سطح المكتب — <b>Desktop</b></div>
          <div class="browser">
            <div class="bar">
              <div class="dots"><i style="background:#E36A5E"></i><i style="background:#E7B14C"></i><i style="background:#5FB87A"></i></div>
              <div class="url">🔒 smart-encyclopedia.ar</div>
              <div style="width:52px"></div>
            </div>
            <iframe src="app.html" title="Desktop"></iframe>
          </div>
        </div>
        <div>
          <div class="label">الجوّال — <b>Mobile</b></div>
          <div class="phone">
            <div class="screen"><iframe src="app.html" title="Mobile"></iframe></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    function fit() {
      const inner = document.getElementById('stageInner');
      const natural = inner.scrollWidth; // ~1200 + 56 + 430
      const avail = window.innerWidth - 48;
      const scale = Math.min(1, avail / natural);
      inner.style.transform = 'scale(' + scale + ')';
      // adjust stage height to scaled content
      inner.parentElement.style.height = (inner.scrollHeight * scale + 20) + 'px';
    }
    window.addEventListener('resize', fit);
    window.addEventListener('load', fit);
    fit();
  </script>
</body>
</html>
